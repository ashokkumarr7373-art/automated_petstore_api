name: Swagger Petstore API Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  test:
    name: Run API Tests & Publish Allure Report
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout code ──────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ── Step 2: Set up Python ──────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # ── Step 3: Cache pip dependencies ────────────────────────
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Step 4: Install dependencies ──────────────────────────
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ── Step 5: Install Allure CLI ─────────────────────────────
      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      # ── Step 6: Run Pytest with Allure results ─────────────────
      - name: Run Tests
        run: |
          pytest --alluredir=allure-results
        continue-on-error: true  # continue even if tests fail so report is always published

      # ── Step 7: Generate Allure HTML Report ───────────────────
      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # ── Step 8: Upload Allure Results as Artifact ─────────────
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      # ── Step 9: Upload Allure HTML Report as Artifact ─────────
      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7

      # ── Step 10: Publish Allure Report to GitHub Pages ────────
      - name: Publish Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          destination_dir: allure-report
